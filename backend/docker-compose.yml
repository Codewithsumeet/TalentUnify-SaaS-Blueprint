version: "3.9"

x-backend-env: &backend-env
  DB_HOST: db
  DB_USER: talentflow
  DB_PASS: talentflow
  DB_NAME: talentflow
  DATABASE_URL: postgresql+asyncpg://talentflow:talentflow@db/talentflow
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  PINECONE_API_KEY: ${PINECONE_API_KEY}
  PINECONE_ENV: ${PINECONE_ENV:-us-east-1}
  PINECONE_INDEX_MAIN: candidates
  PINECONE_INDEX_LOCAL: candidates-local
  LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY}
  # BUG FIX 7: Set both vars. active_dim() reads MODEL NAME, not EMBEDDING_DIM.
  # EMBEDDING_DIM is now informational only.
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
  # BUG FIX 12: Point HuggingFace to the pre-cached model directory in the image.
  TRANSFORMERS_CACHE: /root/.cache/huggingface
  HF_HOME: /root/.cache/huggingface

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: talentflow
      POSTGRES_PASSWORD: talentflow
      POSTGRES_DB: talentflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
    command: sh -c "sleep 2 && alembic upgrade head"
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure   # BUG FIX 8: retry if first migration attempt fails

  api:
    build:
      context: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  worker:
    build:
      context: .
    command: >
      celery -A tasks.celery_app:celery_app worker
      --loglevel=info --concurrency=2 -Q default
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build:
      context: ../talentflow
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../talentflow:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
